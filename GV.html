<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stock & Discord Alert Dashboard</title>
<style>
  body {
    background: #121212;
    color: #eee;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 20px;
  }
  h1, h2 {
    text-align: center;
    letter-spacing: 2px;
    font-weight: 700;
  }
  .container {
    max-width: 700px;
    margin: 0 auto 40px auto;
    background: #1e1e1e;
    border-radius: 15px;
    box-shadow: 0 0 15px #0f9d58;
    padding: 20px;
  }
  .stock {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    margin-bottom: 15px;
    border-radius: 10px;
    background: #222;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    transition: background-color 0.3s ease;
  }
  .stock-name {
    font-weight: 700;
    font-size: 1.4em;
    letter-spacing: 1px;
  }
  .stock-price {
    font-size: 1.3em;
    min-width: 80px;
    text-align: right;
    font-weight: 600;
  }
  .stock-change {
    font-weight: 700;
    min-width: 90px;
    text-align: right;
    padding: 6px 14px;
    border-radius: 50px;
    color: white;
    font-size: 1.1em;
    box-shadow: 0 0 10px;
    user-select: none;
  }
  .up {
    background: #0f9d58;
    box-shadow: 0 0 20px #0f9d58;
  }
  .down {
    background: #db4437;
    box-shadow: 0 0 20px #db4437;
  }
  #error {
    text-align: center;
    color: #db4437;
    margin-top: 20px;
  }
  #log {
    margin-top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 12px;
    font-family: monospace;
    font-size: 0.9em;
    height: 120px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<h1>Stock & Discord Alert Dashboard</h1>

<div class="container stock-container" id="stockContainer">
  กำลังโหลดข้อมูลหุ้น...
</div>

<div class="container">
  <h2>บันทึกการแจ้งเตือน</h2>
  <div id="log"></div>
</div>

<script>
  const stocks = ["AAPL", "GOOGL", "TSLA"];
  const thresholdPercent = 1.0; // เปอร์เซ็นต์เปลี่ยนแปลงที่แจ้งเตือน

  let lastPrices = {};
  const webhookUrl = "https://discord.com/api/webhooks/1393591656657453067/naQOJcNMoI9vTs2sv4Efio5DAZ_euT7VRTsupX_G97_2z7enQIHE_aXAd53k6oV9XWlJ";
  let alertEnabled = true;

  const stockContainer = document.getElementById("stockContainer");
  const errorDiv = document.getElementById("error");
  const logDiv = document.getElementById("log");

  function log(msg) {
    const time = new Date().toLocaleTimeString();
    logDiv.textContent += `[${time}] ${msg}\n`;
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  async function fetchStockData(symbols) {
    const query = symbols.join(",");
    try {
      const response = await fetch(`https://yfapi.net/v6/finance/quote?symbols=${query}`, {
        method: "GET",
        headers: {
          "X-RapidAPI-Host": "yfapi.net",
          "X-RapidAPI-Key": "d1p6nohr01qu436ctjd0d1p6nohr01qu436ctjdg"
        }
      });
      if (!response.ok) throw new Error("เกิดข้อผิดพลาดในการดึงข้อมูลหุ้น");
      const data = await response.json();
      return data.quoteResponse.result;
    } catch (err) {
      throw err;
    }
  }

  async function sendDiscordAlert(stock, changePercent, currentPrice) {
    if (!webhookUrl) return;

    const now = new Date().toLocaleString();

    const payload = {
      username: "Stock Alert Bot",
      avatar_url: "https://cdn-icons-png.flaticon.com/512/6861/6861362.png",
      embeds: [
        {
          title: `📈 แจ้งเตือนหุ้น ${stock.symbol}`,
          url: `https://finance.yahoo.com/quote/${stock.symbol}`,
          color: changePercent > 0 ? 0x0f9d58 : 0xdb4437,
          fields: [
            {
              name: "ราคา",
              value: `$${currentPrice.toFixed(2)}`,
              inline: true
            },
            {
              name: "เปลี่ยนแปลง",
              value: `${changePercent > 0 ? "+" : ""}${changePercent.toFixed(2)}%`,
              inline: true
            },
            {
              name: "เวลา",
              value: now,
              inline: false
            }
          ],
          footer: {
            text: "แจ้งเตือนโดย Stock Alert Dashboard"
          }
        }
      ]
    };

    try {
      const res = await fetch(webhookUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });
      if (res.status === 204) {
        log(`ส่งแจ้งเตือนหุ้น ${stock.symbol} สำเร็จ`);
      } else {
        log(`ส่งแจ้งเตือนหุ้น ${stock.symbol} ล้มเหลว (Status ${res.status})`);
      }
    } catch (e) {
      log(`เกิดข้อผิดพลาดส่งแจ้งเตือน: ${e.message}`);
    }
  }

  function renderStocks(stocksData) {
    stockContainer.innerHTML = "";
    stocksData.forEach(stock => {
      const stockEl = document.createElement("div");
      stockEl.classList.add("stock");

      const nameEl = document.createElement("div");
      nameEl.classList.add("stock-name");
      nameEl.textContent = stock.symbol;

      const priceEl = document.createElement("div");
      priceEl.classList.add("stock-price");
      priceEl.textContent = stock.regularMarketPrice.toFixed(2);

      const changeEl = document.createElement("div");
      changeEl.classList.add("stock-change");
      const changePercent = stock.regularMarketChangePercent;
      changeEl.textContent = (changePercent > 0 ? "+" : "") + changePercent.toFixed(2) + "%";

      if (changePercent > 0) {
        changeEl.classList.add("up");
      } else if (changePercent < 0) {
        changeEl.classList.add("down");
      }

      stockEl.appendChild(nameEl);
      stockEl.appendChild(priceEl);
      stockEl.appendChild(changeEl);

      stockContainer.appendChild(stockEl);
    });
  }

  async function checkAndNotify() {
    errorDiv.textContent = "";
    stockContainer.textContent = "กำลังโหลดข้อมูลหุ้น...";

    try {
      const stocksData = await fetchStockData(stocks);
      renderStocks(stocksData);

      stocksData.forEach(stock => {
        const symbol = stock.symbol;
        const currentPrice = stock.regularMarketPrice;
        const changePercent = stock.regularMarketChangePercent;

        if (lastPrices[symbol]) {
          const diffPercent = ((currentPrice - lastPrices[symbol]) / lastPrices[symbol]) * 100;

          if (alertEnabled && Math.abs(diffPercent) >= thresholdPercent) {
            sendDiscordAlert(stock, diffPercent, currentPrice);
          }
        }
        lastPrices[symbol] = currentPrice;
      });

    } catch (e) {
      errorDiv.textContent = e.message || "ไม่สามารถโหลดข้อมูลหุ้นได้";
      stockContainer.textContent = "";
    }
  }

  checkAndNotify();
  setInterval(checkAndNotify, 300000); // รีเฟรชทุก 5 นาที
</script>

</body>
</html>
